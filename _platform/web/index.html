<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  
  <!-- SEO -->
  <title>1001 Designs - A Collection of Flutter UI Designs</title>
  <meta name="description" content="A curated collection of 1001 UI designs, built with Flutter. Get inspired and kickstart your next project.">

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="1001 Designs - A Collection of Flutter UI Designs">
  <meta property="og:description" content="A curated collection of 1001 UI designs, built with Flutter. Get inspired and kickstart your next project.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://1001-designs.web.app">
  <meta property="og:image" content="https://1001-designs.web.app/icons/icon-large.png">

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="1001 Designs - A Collection of Flutter UI Designs">
  <meta name="twitter:description" content="A curated collection of 1001 UI designs, built with Flutter. Get inspired and kickstart your next project.">
  <meta name="twitter:image" content="https://1001-designs.web.app/icons/icon-large.png">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="1001 Designs">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="theme-color" content="#121212">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <link rel="manifest" href="manifest.json">
</head>

  <script src="flutter_bootstrap.js" async></script>
</body>
