name: one_thousand_and_one_designs
description: "1001 Designs"

version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  flutter_bloc: ^9.0.0
  go_router: ^14.7.1
  flutter_web_plugins:
    sdk: flutter
  get_it: ^8.0.3
  copy_with_extension: ^6.0.1
  dio: ^5.8.0+1
  either_dart: ^1.0.0
  equatable: ^2.0.7
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  copy_with_extension_gen: ^6.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
